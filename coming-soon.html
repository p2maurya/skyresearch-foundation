<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gudsky Research Foundation — Coming Soon</title>

    <!-- Google font similar to the screenshot -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- External stylesheet -->
    <link rel="stylesheet" href="coming-soon.css">
    <style>:root {
    --font: 'Poppins', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    --bg-start: #7db7ff;
    --bg-mid: #2c69d6;
    --bg-end: #183b9a;
    --white: #ffffff;
    --muted-white: rgba(255, 255, 255, 0.85);
    --muted-white-2: rgba(255, 255, 255, 0.75);
    --input-bg: rgba(255, 255, 255, 0.12);
    --accent: #ffd200;
    --max-width: 920px;
}

* {
    box-sizing: border-box
}

html,
body {
    margin: 0;
    height: 100%;
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background:
        radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.08), transparent 15%),
        linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 55%, var(--bg-end) 100%);
    color: var(--white);
}

/* center everything */
.page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
}

/* main card container */
.center-card {
    width: 100%;
    max-width: var(--max-width);
    text-align: center;
    padding: 34px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
}

/* brand */
.brand {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 6px;
}

.logo {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    width: 54px;
    height: 54px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
    box-shadow: 0 6px 20px rgba(10, 20, 40, 0.18);
    flex-shrink: 0;
}

.brand-text .org {
    font-weight: 700;
    font-size: 18px;
    line-height: 1;
    letter-spacing: 0.2px;
    color: var(--white);
}

.brand-text .org-sub {
    font-size: 13px;
    color: var(--muted-white-2);
    font-weight: 600;
    margin-top: 2px;
}

/* headline */
.headline {
    margin: 0;
    font-size: 36px;
    font-weight: 700;
    line-height: 1.05;
    color: var(--white);
    text-shadow: 0 6px 18px rgba(6, 19, 60, 0.18);
}

.headline .accent {
    display: inline-block;
    color: var(--white);
}

/* subtext */
.subtext {
    margin: 0;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.85);
    max-width: 680px;
}

/* form (email + button) */
.notify-form {
    margin-top: 6px;
    width: 100%;
    max-width: 600px;
}

.input-row {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    margin: 12px auto 0;
}

/* input */
.input-row input[type="email"] {
    flex: 1 1 auto;
    min-width: 0;
    padding: 12px 14px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: var(--input-bg);
    color: var(--white);
    font-size: 14px;
    outline: none;
    transition: box-shadow .14s ease, border-color .14s ease;
}

/* placeholder contrast */
.input-row input::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

/* focus */
.input-row input:focus {
    box-shadow: 0 8px 28px rgba(24, 59, 145, 0.18);
    border-color: rgba(255, 255, 255, 0.22);
}

/* notify button */
.btn.notify {
    border: 0;
    padding: 11px 18px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(180deg, #ffd23a 0%, #f5b400 100%);
    color: #13191b;
    box-shadow: 0 8px 28px rgba(245, 180, 0, 0.18);
    white-space: nowrap;
}

/* social area */
.social {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
}

.social-caption {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 2px;
}

/* social icons inline */
.icons {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
}

/* circular buttons */
.social-btn {
    width: 36px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
    color: var(--white);
    text-decoration: none;
    transition: transform .14s ease, background .14s ease;
    box-shadow: 0 6px 18px rgba(6, 20, 60, 0.12);
}

.social-btn:hover {
    transform: translateY(-4px);
    background: rgba(255, 255, 255, 0.12);
}

/* footer links */
.small-footer {
    margin-top: 36px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.65);
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
}

.small-footer a {
    color: rgba(255, 255, 255, 0.65);
    text-decoration: none;
}

.small-footer a:hover {
    color: var(--white);
    text-decoration: underline;
}

.small-footer .dot {
    color: rgba(255, 255, 255, 0.35);
    margin: 0 4px;
}

/* visually hidden for accessibility */
.visually-hidden {
    position: absolute !important;
    height: 1px;
    width: 1px;
    overflow: hidden;
    clip: rect(1px, 1px, 1px, 1px);
    white-space: nowrap;
}

/* responsive adjustments */
@media (max-width: 820px) {
    .headline {
        font-size: 30px;
    }

    .center-card {
        padding: 28px 18px;
    }

    .input-row {
        gap: 10px;
    }
}

@media (max-width:560px) {
    .headline {
        font-size: 26px;
    }

    .brand-text .org {
        font-size: 16px;
    }

    .input-row {
        flex-direction: column;
        align-items: stretch;
    }

    .btn.notify {
        width: 100%;
    }
}

@media (max-width:380px) {
    .logo {
        width: 48px;
        height: 48px;
    }

    .headline {
        font-size: 22px;
    }

    .subtext {
        font-size: 13px;
    }

    .social-btn {
        width: 34px;
        height: 34px;
    }
}</style>
</head>

                    <!-- Instagram -->
                    <a class="social-btn" href="https://www.instagram.com/gudskyresearch/" aria-label="Instagram">

                </div>
            </div>

            <!-- footer links -->
            <footer class="small-footer" aria-hidden="true">
                <a href="#">Privacy Policy</a>

        </div>
    </main>
</body>

</html>
